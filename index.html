<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WOGI DASH — Create Order (market-adaptive prototype)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
:root{
  --bg:#F4F3EF; --surface:#FFFFFF; --text:#1B1B1A; --text2:#6B6B66; --text3:#9A9A94;
  --border:#ECEBE6; --border2:#D9D8D2; --info-bg:#EEEDFE; --info-tx:#3C3489; --indigo:#26215C;
  --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto;padding:28px 24px 60px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px}
h1{font-size:21px;font-weight:600;margin:0}
.sub{font-size:12.5px;color:var(--text2);margin:3px 0 0}
.ctrls{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.mktwrap{display:flex;align-items:center;gap:8px}
.chip{font-size:12px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:999px}
.mlabel{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.3px}
select{font-size:12px;padding:7px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-weight:500}
.vtoggle{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px}
.vbtn{font-size:12px;padding:6px 14px;border-radius:999px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-weight:500}
.vbtn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.07)}
.ltag{font-size:11px;font-weight:600;color:var(--info-tx);background:var(--info-bg);padding:4px 11px;border-radius:6px;display:inline-block;margin-bottom:14px}
.hero{background:var(--surface);border:2px solid #B9B3E8;border-radius:var(--radius);padding:22px;margin-bottom:14px;display:flex;justify-content:space-between;gap:22px;flex-wrap:wrap;cursor:pointer;overflow:hidden}
.badge{font-size:11px;background:var(--info-bg);color:var(--info-tx);padding:3px 10px;border-radius:8px;font-weight:600}
.btn{background:var(--indigo);color:#EEEDFE;border:none;font-size:13px;font-weight:500;padding:9px 18px;border-radius:8px;cursor:pointer;transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
.seclbl{font-size:12.5px;font-weight:600;color:var(--text2);margin:0 0 8px}
.seclbl span{font-weight:400}
.row{display:grid;gap:10px;margin-bottom:18px;grid-template-columns:repeat(auto-fit,minmax(0,1fr))}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s,opacity .25s;opacity:0;transform:translateY(8px)}
.pcard.in{opacity:1;transform:none}
.row:hover .pcard.in:not(:hover){opacity:.92}
.pcard:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 8px 22px rgba(20,20,40,.09)}
.pcimg{height:56px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.pcname{font-size:13.5px;font-weight:600;margin:0}
.pcdesc{font-size:11.5px;color:var(--text2);margin:3px 0 9px;line-height:1.4}
.pclink{font-size:12px;color:var(--info-tx);margin:auto 0 0;font-weight:500}
.fan{position:relative;width:190px;height:110px}
.fc{position:absolute;width:96px;height:60px;border-radius:7px;padding:7px;transition:transform .38s cubic-bezier(.22,1,.36,1)}
.fc1{left:6px;top:22px;background:#F0997B;transform:rotate(-9deg)}
.fc2{left:48px;top:10px;background:#5DCAA5;transform:rotate(-1deg)}
.fc3{left:90px;top:24px;background:#AFA9EC;transform:rotate(8deg)}
.hero:hover .fc1{transform:rotate(-16deg) translate(-22px,-4px)}
.hero:hover .fc2{transform:translateY(-13px)}
.hero:hover .fc3{transform:rotate(15deg) translate(22px,-2px)}
.fcl{font-size:8px;margin:0;font-weight:600;opacity:.75}
.fct{font-size:11px;font-weight:700;margin:12px 0 0;letter-spacing:.5px}
.tcard{width:80px;height:48px;border-radius:6px;padding:6px;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.pcard:hover .uc{transform:rotate(-5deg) translateY(-4px) scale(1.06)}
.lgrow{display:flex;gap:4px;align-items:center}
.lg{width:24px;height:24px;border-radius:6px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
.pcard:hover .lg{transform:translateY(-5px)}
.stk{position:relative;width:62px;height:40px}
.sc{position:absolute;width:54px;height:34px;border-radius:5px;padding:4px;transition:transform .35s cubic-bezier(.22,1,.36,1)}
.sc1{transform:rotate(-7deg) translateX(-10px)}.sc3{transform:rotate(7deg) translateX(10px)}
.pcard:hover .sc1{transform:rotate(-15deg) translateX(-17px)}
.pcard:hover .sc3{transform:rotate(15deg) translateX(17px)}
.icbox{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.pcard:hover .icbox{transform:translateY(-4px) rotate(-8deg) scale(1.08)}
.merchrow{display:flex;gap:6px;align-items:center}
.mitem{width:42px;height:42px;display:flex;align-items:center;justify-content:center;transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.mmore{width:30px;height:30px;border-radius:8px;border:1px dashed var(--border2);color:var(--text3);font-size:8px;font-weight:600;display:flex;align-items:center;justify-content:center}
.pcard:hover .mitem:nth-child(1){transform:translateY(-6px)}
.pcard:hover .mitem:nth-child(2){transform:translateY(-6px);transition-delay:.05s}
.pcard:hover .mitem:nth-child(3){transform:translateY(-6px);transition-delay:.1s}
.catalog{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.searchbar{background:var(--bg);border:1px solid var(--border);border-radius:9px;height:38px;display:flex;align-items:center;padding:0 12px;font-size:13px;color:var(--text3);margin-bottom:12px}
.pills{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pill{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border2);color:var(--text2)}
.pill.on{background:var(--indigo);color:#EEEDFE;border-color:var(--indigo)}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.btile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;transition:transform .2s}
.btile:hover{transform:translateY(-2px)}
.foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border-top:1px solid var(--border);padding-top:14px;margin-bottom:8px}
.trust{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.complink{font-size:12px;color:var(--info-tx);cursor:pointer;font-weight:500}
.disc{font-size:10.5px;color:var(--text3);margin:0;line-height:1.5}
.cmpscroll{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);-webkit-overflow-scrolling:touch}
table.cmp{border-collapse:collapse;font-size:11.5px;min-width:100%}
.cmp td{padding:11px 10px;text-align:center;border-top:1px solid var(--border);transition:background .18s;line-height:1.4}
.cmp col.hl{background:var(--info-bg)}
.cmp td.lbl{text-align:left;color:var(--text2);position:sticky;left:0;background:var(--surface);min-width:104px;width:104px;z-index:3;font-weight:500;box-shadow:1px 0 0 var(--border)}
.cmp th.prod{min-width:146px;width:146px;vertical-align:top;padding:14px 10px 12px;text-align:center;font-weight:400;transition:background .18s}
.cmp th.prod.hlcol,.cmp td.hlcol{background:var(--info-bg)}
.cmp td.colhover,.cmp th.prod.colhover{background:#F4F3EF}
.cmp th.prod.hlcol.colhover,.cmp td.hlcol.colhover{background:#E4E2FA}
.imgwell{height:64px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.cmp th.prod:hover .imgwell{transform:translateY(-3px)}
.cmp th.prod:hover .fan .fc1{transform:rotate(-15deg) translate(-14px,-3px)}
.cmp th.prod:hover .fan .fc2{transform:translateY(-8px)}
.cmp th.prod:hover .fan .fc3{transform:rotate(14deg) translate(14px,-2px)}
.cmp th.prod:hover .uc{transform:rotate(-5deg) translateY(-3px) scale(1.05)}
.cmp th.prod:hover .sc1{transform:rotate(-15deg) translateX(-15px)}
.cmp th.prod:hover .sc3{transform:rotate(15deg) translateX(15px)}
.cmp .imgwell{overflow:hidden}
.cmp .imgwell .fan{transform:scale(.52);transform-origin:center;margin:0 -45px}
.cmp .imgwell .merchrow{transform:scale(.92);transform-origin:center}
.pname{font-weight:600;font-size:12.5px;margin:0}
.pdesc{font-size:10.5px;color:var(--text2);margin:3px 0 0;line-height:1.35;min-height:28px}
.backbtn{font-size:13px;border:1px solid var(--border2);background:var(--surface);padding:7px 14px;border-radius:8px;cursor:pointer}
.cmpcta{display:inline-block;font-size:11px;padding:6px 12px;border-radius:7px;border:1px solid var(--border2);transition:transform .15s}
.cmp th.prod:hover .cmpcta,.cmp td.ctacell:hover .cmpcta{transform:scale(1.05)}
.cmpcta.prime{background:var(--indigo);color:#EEEDFE;border:none;font-weight:500}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Create order</h1>
      <p class="sub">Choose a reward product</p>
    </div>
    <div class="ctrls">
      <div class="mktwrap">
        <span class="chip" id="locchip">Singapore · SGD</span>
        <span class="mlabel">MARKET</span>
        <select id="mkt">
          <option value="SG">SG · Singapore</option>
          <option value="MY">MY · Malaysia</option>
          <option value="TH">TH · Thailand</option>
          <option value="HK">HK · Hong Kong</option>
          <option value="VN">VN · Vietnam</option>
          <option value="ID">ID · Indonesia</option>
          <option value="JP">JP · Japan</option>
          <option value="KR">KR · Korea</option>
          <option value="AU">AU · Australia</option>
          <option value="CN">CN · China</option>
          <option value="NZ">NZ · New Zealand</option>
        </select>
      </div>
      <div class="vtoggle">
        <button class="vbtn on" id="vCreate">Create order</button>
        <button class="vbtn" id="vCompare">Compare products</button>
      </div>
    </div>
  </div>
  <div id="stage"></div>
</div>
<script>
(function(){
  var P={
    mbgc:{n:'Multi-brand Gift Card',s:'Pick from 200+ brands',d:'Send one gift card — every recipient redeems at their pick of 200+ brands.',g:'gift',cta:'Start order',who:'Recipient',redeem:'200+ brands',best:'Group rewards',use:'Employee rewards at scale',amt:'$5–$500',del:'Instant email or CSV bulk'},
    universal:{n:'Universal Gift Card',s:'Redeemable at all participating merchants',g:'gift',cta:'Start order',who:'Recipient',redeem:'Any participating merchant',best:'Everyday flexible rewards',use:'Meal or transport allowance',amt:'$5–$500',del:'Instant email or CSV bulk'},
    choice:{n:'CHOICE',s:'They redeem one from a set you curate',g:'gift',cta:'Start order',who:'Recipient, from your list',redeem:'Brands you approve',best:'Curated gifting',use:'Premium client gifting',amt:'Set per card',del:'One link per recipient'},
    brand:{n:'Brand Gift Cards',s:'The exact brand they love',g:'gift',cta:'Browse brands',who:'You',redeem:'One brand only',best:'Personal touch',use:'Top-performer recognition',amt:'Varies by brand',del:'Instant email'},
    perks:{n:'Perks',s:'Ongoing deals and offers',g:'gift',cta:'Explore perks',who:'Recipient',redeem:'Curated deals',best:'Always-on programs',use:'Engagement programs',amt:'—',del:'In-app'},
    wogipay:{n:'WOGI Pay',s:'E-wallet brand vouchers — GrabPay, GCash, OVO, momo',g:'beyond',cta:'Start order',who:'Recipient',redeem:'E-wallet partners',best:'Everyday flexible rewards',use:'Frontline & gig rewards',amt:'Set per voucher',del:'Instant'},
    points:{n:'Points & Miles',s:'Airline miles and loyalty point partners',g:'beyond',cta:'Start order',who:'Recipient',redeem:'Loyalty point partners',best:'Loyalty builders',use:'Travel & frequent-flyer rewards',amt:'Set per voucher',del:'Instant'},
    merch:{n:'Merchandise',s:'AirPods, iPhone and 500+ gifts, shipped',g:'beyond',cta:'Browse catalog',who:'You',redeem:'Ships to recipient',best:'Premium gifting',use:'Milestone & VIP gifts',amt:'Varies by item',del:'Shipped to door'}
  };
  var AV={SG:['mbgc','universal','choice','brand','perks','merch','points'],MY:['mbgc','brand','perks','merch','wogipay'],TH:['mbgc','brand','merch','wogipay'],HK:['mbgc','brand','merch'],VN:['mbgc','brand','merch','wogipay','points'],ID:['mbgc','brand','wogipay','points'],JP:['brand','merch','wogipay'],KR:['brand','wogipay'],AU:['brand'],CN:['brand'],NZ:['brand']};
  var MK={SG:['Singapore','SGD'],MY:['Malaysia','MYR'],TH:['Thailand','THB'],HK:['Hong Kong','HKD'],VN:['Vietnam','VND'],ID:['Indonesia','IDR'],JP:['Japan','JPY'],KR:['Korea','KRW'],AU:['Australia','AUD'],CN:['China','CNY'],NZ:['New Zealand','NZD']};
  var WORDS={SG:'Seven',MY:'Five',TH:'Four',HK:'Three',VN:'Five',ID:'Four',JP:'Three',KR:'Two'};
  /* Realistic transparent-background product illustrations (SVG). In production
     these slots take real cut-out product photos at the same size. */
  var MIMG={
    headphones:'<svg viewBox="0 0 48 48" width="40" height="40" aria-label="Headphones"><path d="M9 27v-3a15 15 0 0 1 30 0v3" fill="none" stroke="#2C2C2A" stroke-width="2.4" stroke-linecap="round"/><rect x="6" y="26" width="8" height="13" rx="3.4" fill="#3C3489"/><rect x="34" y="26" width="8" height="13" rx="3.4" fill="#3C3489"/><rect x="7.4" y="28" width="2" height="9" rx="1" fill="#6F66C9"/></svg>',
    phone:'<svg viewBox="0 0 48 48" width="40" height="40" aria-label="Smartphone"><rect x="15" y="6" width="18" height="36" rx="4" fill="#1B1B1A"/><rect x="17" y="9.5" width="14" height="25" rx="1.5" fill="#5DCAA5"/><rect x="21" y="37.5" width="6" height="1.6" rx="0.8" fill="#555"/></svg>',
    watch:'<svg viewBox="0 0 48 48" width="40" height="40" aria-label="Smartwatch"><rect x="18" y="4" width="12" height="9" rx="2" fill="#444"/><rect x="18" y="35" width="12" height="9" rx="2" fill="#444"/><rect x="14" y="13" width="20" height="22" rx="6" fill="#1B1B1A"/><rect x="16.5" y="15.5" width="15" height="17" rx="4" fill="#378ADD"/><circle cx="33.5" cy="24" r="1.4" fill="#A16207"/></svg>'
  };
  function img(k){
    if(k==='mbgc')return '<div class="fan"><div class="fc fc1"><p class="fcl" style="color:#4A1B0C">UNIQGIFT</p><p class="fct" style="color:#4A1B0C">EATS</p></div><div class="fc fc2"><p class="fcl" style="color:#04342C">UNIQGIFT</p><p class="fct" style="color:#04342C">GROCERIES</p></div><div class="fc fc3"><p class="fcl" style="color:#26215C">UNIQGIFT</p><p class="fct" style="color:#26215C">FLEX</p></div></div>';
    if(k==='universal')return '<div class="tcard uc" style="background:#7F77DD"><p class="fcl" style="color:#EEEDFE">UNIQGIFT</p><p class="fct" style="color:#EEEDFE;font-size:10px">ULTIMATE</p></div>';
    if(k==='choice')return '<div class="stk"><div class="sc sc1" style="background:#F5C4B3"><p style="font-size:6px;color:#4A1B0C;margin:0;font-weight:700">TREAT</p></div><div class="sc sc2" style="background:#D3D1C7"><p style="font-size:6px;color:#2C2C2A;margin:0;font-weight:700">MEAL</p></div><div class="sc sc3" style="background:#444441"><p style="font-size:6px;color:#F1EFE8;margin:0;font-weight:700">DINING</p></div></div>';
    if(k==='brand')return '<div class="lgrow"><div class="lg" style="background:#1D9E75;color:#E1F5EE">Grab</div><div class="lg" style="background:#F1EFE8;color:#2C2C2A;font-size:9px">a</div><div class="lg" style="background:#993556;color:#FBEAF0;font-size:6px">momo</div><div class="lg" style="background:#378ADD;color:#E6F1FB">GC</div><div class="lg" style="border:1px dashed #D9D8D2;color:#9A9A94;font-size:6.5px">+180</div></div>';
    if(k==='perks')return '<svg viewBox="0 0 48 48" width="42" height="42" aria-label="Perks"><circle cx="24" cy="24" r="20" fill="#E1F5EE"/><path d="M18 18.5l12 11M19.5 18.5a1.6 1.6 0 1 0 0 .01M28.5 29.5a1.6 1.6 0 1 0 0 .01" fill="none" stroke="#0F6E56" stroke-width="2.6" stroke-linecap="round"/><path d="M24 9.5l1.6 3.4 3.7.5-2.7 2.6.7 3.7-3.3-1.8-3.3 1.8.7-3.7-2.7-2.6 3.7-.5z" fill="#1D9E75" transform="translate(11 19) scale(0.45)"/></svg>';
    if(k==='wogipay')return '<div style="display:flex;gap:7px;align-items:center"><div class="icbox" style="background:#E6F1FB"><i class="ti ti-ticket" style="font-size:18px;color:#185FA5"></i></div><div class="lgrow"><div class="lg" style="background:#378ADD;color:#E6F1FB;width:20px;height:20px;font-size:6px">GC</div><div class="lg" style="background:#7F77DD;color:#EEEDFE;width:20px;height:20px;font-size:5.5px">OVO</div><div class="lg" style="background:#993556;color:#FBEAF0;width:20px;height:20px;font-size:5px">momo</div></div></div>';
    if(k==='points')return '<svg viewBox="0 0 48 48" width="42" height="42" aria-label="Points and Miles"><circle cx="24" cy="24" r="20" fill="#EEEDFE"/><path d="M30.5 17.5L17 22l4.3 2.1 1.4 4.6 2.2-3.6 5.1 4.2 2.3-10.8a1 1 0 0 0-1.3-1.2z" fill="#534AB7"/><circle cx="20" cy="30.5" r="1.3" fill="#534AB7"/><circle cx="16.5" cy="27" r="1" fill="#534AB7"/></svg>';
    if(k==='merch')return '<div class="merchrow"><div class="mitem">'+MIMG.headphones+'</div><div class="mitem">'+MIMG.phone+'</div><div class="mitem">'+MIMG.watch+'</div><div class="mmore">+500</div></div>';
    return '';
  }
  var state={mkt:'SG',view:'create'};
  var stage=document.getElementById('stage');
  function pcard(k){var p=P[k];return '<div class="pcard"><div class="pcimg">'+img(k)+'</div><p class="pcname">'+p.n+'</p><p class="pcdesc">'+p.s+'</p><p class="pclink">'+p.cta+' →</p></div>';}
  function brandTiles(){var b=[['SB','#E1F5EE','#085041'],['a','#FAEEDA','#633806'],['Grab','#E1F5EE','#085041'],['momo','#FBEAF0','#72243E'],['GC','#E6F1FB','#0C447C'],['OVO','#EEEDFE','#3C3489'],['Trip','#E6F1FB','#185FA5'],['+80','#fff','#888']];return b.map(function(x){return '<div class="btile"><div style="width:34px;height:34px;border-radius:50%;background:'+x[1]+';color:'+x[2]+';font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 6px">'+x[0]+'</div><p style="font-size:11px;font-weight:500;margin:0">Brand</p></div>';}).join('');}
  function catalogBlock(){return '<div class="catalog"><p style="font-size:15px;font-weight:600;margin:0 0 2px">Choose a brand</p><p style="font-size:12px;color:var(--text2);margin:0 0 12px">90+ brands · instant bulk delivery</p><div class="searchbar"><i class="ti ti-search" style="font-size:14px;margin-right:8px"></i>Search brands…</div><div class="pills"><span class="pill on">All</span><span class="pill">Dining</span><span class="pill">Retail</span><span class="pill">Convenience</span><span class="pill">Beauty</span></div><div class="bgrid">'+brandTiles()+'</div></div>';}
  function animateIn(){var c=stage.querySelectorAll('.pcard');c.forEach(function(x,i){setTimeout(function(){x.classList.add('in');},60+i*45);});}
  function renderCreate(){
    var list=AV[state.mkt], hasM=list.indexOf('mbgc')>-1;
    var gift=list.filter(function(k){return P[k].g==='gift';});
    var beyond=list.filter(function(k){return P[k].g==='beyond';});
    var h='';
    if(hasM){
      h+='<div class="ltag">Layout A · Multi-brand hero</div>';
      var p=P.mbgc;
      h+='<div class="hero"><div style="flex:1;min-width:280px"><span class="badge">★ Most popular</span><p style="font-size:18px;font-weight:600;margin:10px 0 3px">'+p.n+'</p><p style="font-size:13.5px;margin:0 0 4px">'+p.d+'</p><p style="font-size:12.5px;color:var(--text2);margin:0 0 14px">Themed designs for every occasion: Flex, Eats, Groceries, Thank You and more.</p><div style="display:flex;gap:10px;align-items:center"><button class="btn">Start order</button><span style="font-size:12px;color:var(--text2)">$5–$500 · instant delivery</span></div></div><div style="display:flex;align-items:center;justify-content:center;min-width:200px">'+img('mbgc')+'</div></div>';
      var more=gift.filter(function(k){return k!=='mbgc';});
      if(more.length)h+='<p class="seclbl">More gift cards</p><div class="row">'+more.map(pcard).join('')+'</div>';
      if(beyond.length)h+='<p class="seclbl">Beyond gift cards <span>— vouchers, points, and physical gifts</span></p><div class="row">'+beyond.map(pcard).join('')+'</div>';
    } else if(list.length>1){
      h+='<div class="ltag">Layout B · Brand-led (no Multi-brand in this market)</div>'+catalogBlock();
      if(beyond.length)h+='<p class="seclbl">Beyond gift cards <span>— vouchers, points, and physical gifts</span></p><div class="row">'+beyond.map(pcard).join('')+'</div>';
    } else {
      h+='<div class="ltag">Layout C · Single product · brand catalog only</div>'+catalogBlock();
    }
    var showCompare=list.length>1;
    h+='<div class="foot"><div class="trust"><span><i class="ti ti-shield-check" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>Trusted by 2,000+ teams</span><span><i class="ti ti-bolt" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>Instant delivery</span></div>'+(showCompare?'<span class="complink" id="goCompare">Not sure? Compare all products →</span>':'<span style="font-size:12px;color:var(--text3)">Single product market</span>')+'</div>';
    h+='<p class="disc">All gift cards and vouchers are closed-loop rewards, redeemable only with participating merchants. Not redeemable for cash, not transferable, and not a payment instrument.</p>';
    stage.innerHTML=h;
    var gc=document.getElementById('goCompare');
    if(gc)gc.addEventListener('click',function(){state.view='compare';sync();});
    animateIn();
  }
  var CSUB={mbgc:'Pick from 200+ brands',universal:'Redeem anywhere',choice:'Pick from a curated set',brand:'One brand they love',perks:'Ongoing deals & offers',wogipay:'E-wallet vouchers',points:'Miles & loyalty points',merch:'Physical gifts, shipped'};
  function renderCompare(){
    var list=AV[state.mkt].slice();
    if(list.length<2){state.view='create';sync();return;}
    var hasM=list.indexOf('mbgc')>-1, hlKey=hasM?'mbgc':'brand';
    var rows=[['WHO PICKS','who'],['REDEEM AT','redeem'],['BEST FOR','best'],['TYPICAL USE','use'],['AMOUNTS','amt'],['DELIVERY','del']];
    var word=WORDS[state.mkt]||(''+list.length);
    var h='<div class="topbar" style="margin-bottom:14px"><div><h1>Compare products</h1><p class="sub">'+word+' ways to send rewards in '+MK[state.mkt][0]+' — see which fits your situation</p></div><button class="backbtn" id="goBack"><i class="ti ti-arrow-left" style="font-size:13px;vertical-align:-2px;margin-right:5px"></i>Back</button></div>';
    h+='<div class="cmpscroll"><table class="cmp">';
    // colgroup for whole-column highlight
    h+='<colgroup><col style="width:104px">';
    list.forEach(function(k){h+='<col'+(k===hlKey?' class="hl"':'')+'>';});
    h+='</colgroup>';
    // header row
    h+='<thead><tr><th class="lbl" style="vertical-align:bottom"></th>';
    list.forEach(function(k){
      var hc=(k===hlKey)?' hlcol':'';
      h+='<th class="prod'+hc+'" data-col="'+k+'">'+(k===hlKey?'<div style="margin-bottom:6px"><span class="badge">★ Most popular</span></div>':'')+'<div class="imgwell">'+img(k)+'</div><p class="pname">'+P[k].n+'</p><p class="pdesc">'+CSUB[k]+'</p></th>';
    });
    h+='</tr></thead><tbody>';
    rows.forEach(function(r){
      h+='<tr><td class="lbl">'+r[0]+'</td>';
      list.forEach(function(k){var hc=(k===hlKey)?' hlcol':'';h+='<td class="'+hc+'" data-col="'+k+'">'+P[k][r[1]]+'</td>';});
      h+='</tr>';
    });
    h+='<tr><td class="lbl"></td>';
    list.forEach(function(k){var hc=(k===hlKey)?' hlcol':'';var pr=(k===hlKey)?' prime':'';h+='<td class="ctacell'+hc+'" data-col="'+k+'"><span class="cmpcta'+pr+'">'+P[k].cta+'</span></td>';});
    h+='</tr></tbody></table></div>';
    stage.innerHTML=h;
    document.getElementById('goBack').addEventListener('click',function(){state.view='create';sync();});
    // column hover highlight
    var cells=stage.querySelectorAll('[data-col]');
    cells.forEach(function(c){
      c.addEventListener('mouseenter',function(){
        var col=c.getAttribute('data-col');
        stage.querySelectorAll('[data-col="'+col+'"]').forEach(function(x){x.classList.add('colhover');});
      });
      c.addEventListener('mouseleave',function(){
        var col=c.getAttribute('data-col');
        stage.querySelectorAll('[data-col="'+col+'"]').forEach(function(x){x.classList.remove('colhover');});
      });
    });
  }
  function sync(){
    document.getElementById('vCreate').classList.toggle('on',state.view==='create');
    document.getElementById('vCompare').classList.toggle('on',state.view==='compare');
    document.getElementById('locchip').textContent=MK[state.mkt][0]+' · '+MK[state.mkt][1];
    if(state.view==='create')renderCreate();else renderCompare();
  }
  document.getElementById('mkt').addEventListener('change',function(e){state.mkt=e.target.value;sync();});
  document.getElementById('vCreate').addEventListener('click',function(){state.view='create';sync();});
  document.getElementById('vCompare').addEventListener('click',function(){state.view='compare';sync();});
  sync();
})();
</script>
</body>
</html>
